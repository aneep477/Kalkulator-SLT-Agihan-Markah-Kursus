<!DOCTYPE html>
<html>
  <body>
    <h3>Pilih Fail MK (.xlsx)</h3>
    <input type="file" id="fail">
    <button onclick="hantar()">PROSES</button>
    <p id="status"></p>

    <script>
      function hantar() {
        var failInput = document.getElementById('fail');
        var status = document.getElementById('status');
        
        if (failInput.files.length == 0) return alert("Pilih fail!");
        
        status.innerText = "⏳ Memproses...";
        var fail = failInput.files[0];
        var pembaca = new FileReader();
        
        pembaca.onload = function(e) {
          var base64 = e.target.result.split(',')[1];
          
          // Memanggil fungsi dengan parameter berasingan
          google.script.run
            .withSuccessHandler(res => status.innerText = res)
            .mulaProses(base64, fail.name, fail.type);
        };
        pembaca.readAsDataURL(fail);
      }
    </script>
  </body>
</html>
