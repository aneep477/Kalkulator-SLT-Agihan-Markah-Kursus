<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding-top: 50px; background: #f0f2f5; }
    .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 400px; }
    h2 { color: #1a73e8; margin-bottom: 20px; text-align: center; }
    .upload-box { border: 2px dashed #dadce0; padding: 20px; text-align: center; border-radius: 8px; margin-bottom: 20px; }
    button { background: #1a73e8; color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; cursor: pointer; font-size: 16px; font-weight: bold; }
    button:disabled { background: #ccc; }
    #msg { margin-top: 15px; text-align: center; font-size: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Kalkulator MK API</h2>
    <div class="upload-box">
      <input type="file" id="fileInp" accept=".xlsx">
    </div>
    <button id="btn" onclick="hantarFail()">MUAT NAIK & PROSES</button>
    <div id="msg"></div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwc70zwZQa-DC_BWKTec28EIGT1BbBPncECU6LVt8QGxAE2aYM_t6nON6mljo6eZ45_/exec";

    function hantarFail() {
      const fileInp = document.getElementById('fileInp');
      const msg = document.getElementById('msg');
      const btn = document.getElementById('btn');

      if (!fileInp.files[0]) {
        msg.innerHTML = "<span style='color:red'>Sila pilih fail .xlsx!</span>";
        return;
      }

      btn.disabled = true;
      msg.innerHTML = "⏳ Memproses di Backend API...";
      
      const file = fileInp.files[0];
      const reader = new FileReader();

      reader.onload = function(e) {
        const base64 = e.target.result.split(',')[1];
        
        fetch(API_URL, {
          method: 'POST',
          mode: 'no-cors', // Penting untuk mengelakkan ralat CORS pada Web App
          body: JSON.stringify({
            data: base64,
            filename: file.name,
            mimetype: file.type
          })
        }).then(() => {
          msg.innerHTML = "<span style='color:green'>✅ Selesai! Sila semak Google Sheet anda.</span>";
          btn.disabled = false;
        }).catch(err => {
          msg.innerHTML = "<span style='color:red'>Ralat sambungan API.</span>";
          btn.disabled = false;
        });
      };
      reader.readAsDataURL(file);
    }
  </script>
</body>
</html>
